<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Brian gage006. Technical Account Manager, Software Development.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0a1f"/>
      <stop offset="0.5" stop-color="#16093a"/>
      <stop offset="1" stop-color="#04111f"/>
    </linearGradient>
    <radialGradient id="blobA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f97316" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobD" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="0.4" stop-color="#fbbf24"/>
      <stop offset="0.7" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#60a5fa"/>
      <animate attributeName="x1" values="0;0.4;0" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1;1.4;1" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" rx="20" fill="url(#bg)"/>

  <g filter="url(#glow)">
    <circle r="300" fill="url(#blobA)">
      <animate attributeName="cx" values="220;420;220" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="120;220;120" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle r="300" fill="url(#blobB)">
      <animate attributeName="cx" values="1000;820;1000" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="230;70;230" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle r="280" fill="url(#blobC)">
      <animate attributeName="cx" values="660;520;660" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="90;260;90" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle r="260" fill="url(#blobD)">
      <animate attributeName="cx" values="430;180;430" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="240;120;240" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle r="240" fill="url(#blobB)">
      <animate attributeName="cx" values="780;980;780" dur="22s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="120;250;120" dur="22s" repeatCount="indefinite"/>
    </circle>
  </g>

  <rect width="1200" height="320" rx="20" fill="url(#grid)"/>
  <rect width="1200" height="320" rx="20" fill="#05050f" fill-opacity="0.18"/>

  <g font-family="monospace" fill="#ffffff" fill-opacity="0.10" font-weight="700">
    <text x="70" y="270" font-size="58">&lt;/&gt;</text>
    <text x="1050" y="90" font-size="46">{ }</text>
    <text x="1090" y="270" font-size="30">$_</text>
    <text x="120" y="80" font-size="26">01101</text>
  </g>

  <rect x="60" y="104" width="6" height="120" rx="3" fill="url(#accentLine)"/>

  <g font-family="'Segoe UI',Arial,sans-serif">
    <text x="92" y="158" font-size="70" font-weight="800" fill="url(#nameGrad)" filter="url(#glow)">Hi, I'm Brian</text>
    <text x="94" y="158" font-size="70" font-weight="800" fill="url(#nameGrad)">Hi, I'm Brian</text>
    <text x="94" y="206" font-size="27" font-weight="600" fill="#e9d5ff"><tspan fill="#22d3ee">Technical Account Manager</tspan> &#183; <tspan fill="#fb923c">Software Development</tspan></text>

    <g>
      <rect x="94" y="228" width="150" height="34" rx="17" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
      <circle cx="116" cy="245" r="5" fill="#22d3ee">
        <animate attributeName="fill-opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="130" y="251" font-size="18" font-weight="600" fill="#cbd5e1" font-family="monospace">@gage006</text>
    </g>
  </g>

  <rect x="1" y="1" width="1198" height="318" rx="20" fill="none" stroke="url(#accentLine)" stroke-opacity="0.6" stroke-width="2"/>
</svg>
